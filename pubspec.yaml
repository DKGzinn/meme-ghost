name: meme_ghost
description: Um aplicativo de memes com overlay transparente estilo fantasma.
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_overlay_window: ^0.5.0
  just_audio: ^0.9.30
  video_player: ^2.7.0
  gif_view: ^0.5.0
  permission_handler: ^11.0.0
  path_provider: ^2.1.0
  provider: ^6.0.0
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/memes/
    - assets/audio/
    - assets/gifs/
